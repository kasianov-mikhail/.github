name: Resolve Conflicts

on:
  workflow_call:
    inputs:
      pr:
        required: true
        type: number
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_PAT:
        required: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write

    steps:
      - name: Get PR branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH=$(gh pr view ${{ inputs.pr }} --repo ${{ github.repository }} --json headRefName --jq '.headRefName')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            PR #${{ inputs.pr }} has merge conflicts with main.

            1. Run `git merge origin/main` to see the conflicts
            2. Resolve all conflicts
            3. Commit the merge and push
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-opus-4-6"
